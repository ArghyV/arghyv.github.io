<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>type(rä)writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Anonymous+Pro:ital,wght@0,400;0,700;1,400&family=Arimo:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs" type="module"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #2a2825;
  --toolbar-bg:     #1c1b19;
  --toolbar-border: #3d3b37;
  --ruler-bg:       #232220;
  --ruler-text:     #6b6760;
  --ruler-stop:     #c8a45a;
  --btn-hover:      #423f35;
  --btn-text:       #c4bfb5;
  --btn-active:     #c8a45a;
  --cursor-color:   rgba(200,164,90,0.8);
  --cursor-blink:   rgba(200,164,90,0);
  --shadow:         rgba(0,0,0,0.6);
  --toolbar-h: 42px;
  --ruler-w:   32px;
  --ruler-h:   24px;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Courier Prime', monospace;
  color: var(--btn-text);
  user-select: none;
}

/* ── TOOLBAR ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--toolbar-h);
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  display: flex; align-items: center;
  padding: 0 8px; gap: 2px;
  z-index: 100;
}
#toolbar-title {
  font-size: 13px; letter-spacing: 0.08em;
  color: var(--ruler-stop);
  padding: 0 10px 0 4px;
  border-right: 1px solid var(--toolbar-border);
  margin-right: 4px; white-space: nowrap;
}
.tb-btn {
  background: none; border: none; cursor: pointer;
  color: var(--btn-text); padding: 5px 9px;
  font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; border-radius: 3px;
  transition: background 0.1s, color 0.1s; white-space: nowrap;
}
.tb-btn:hover  { background: var(--btn-hover); }
.tb-btn.active { color: var(--btn-active); background: var(--btn-hover); }
.tb-btn:disabled { opacity: 0.35; cursor: default; }
.tb-sep { width: 1px; height: 20px; background: var(--toolbar-border); margin: 0 4px; flex-shrink: 0; }
#status-bar { margin-left: auto; font-size: 10px; color: var(--ruler-text); letter-spacing: 0.05em; padding-right: 8px; }

/* ── RULERS ── */
#ruler-top {
  position: fixed;
  top: var(--toolbar-h); left: var(--ruler-w); right: 0;
  height: var(--ruler-h);
  background: var(--ruler-bg);
  border-bottom: 1px solid var(--toolbar-border);
  z-index: 90; overflow: hidden; cursor: crosshair;
}
#ruler-left {
  position: fixed;
  top: calc(var(--toolbar-h) + var(--ruler-h)); left: 0;
  width: var(--ruler-w); bottom: 0;
  background: var(--ruler-bg);
  border-right: 1px solid var(--toolbar-border);
  z-index: 90; overflow: hidden;
}
#ruler-corner {
  position: fixed;
  top: var(--toolbar-h); left: 0;
  width: var(--ruler-w); height: var(--ruler-h);
  background: var(--ruler-bg);
  border-right: 1px solid var(--toolbar-border);
  border-bottom: 1px solid var(--toolbar-border);
  z-index: 95;
}

/* ── VIEWPORT ── */
#viewport {
  position: fixed;
  top: calc(var(--toolbar-h) + var(--ruler-h));
  left: var(--ruler-w); right: 0; bottom: 0;
  overflow: hidden; cursor: default;
}

/* ── PAGES ── */
.page-wrapper {
  position: absolute;
  box-shadow: 0 4px 32px var(--shadow), 0 1px 8px var(--shadow);
}
.page-canvas { position: absolute; top: 0; left: 0; display: block; }
.page-badge {
  position: absolute; bottom: -22px; left: 0; right: 0;
  text-align: center; font-size: 9px; letter-spacing: 0.1em;
  color: var(--ruler-text); pointer-events: none; text-transform: uppercase;
}
#pages-container { position: absolute; transform-origin: top center; }

/* ── CURSOR ── */
#cursor {
  position: absolute; pointer-events: none; z-index: 50;
  border: 1.5px solid var(--cursor-color);
  background: rgba(200,164,90,0.06);
  animation: blink 1.1s step-end infinite;
  mix-blend-mode: screen;
}
@keyframes blink {
  0%, 100% { border-color: var(--cursor-color); background: rgba(200,164,90,0.06); }
  50%       { border-color: var(--cursor-blink); background: transparent; }
}
#cursor.typing { animation: none; border-color: var(--cursor-color); background: rgba(200,164,90,0.1); }

/* ── MODALS ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--toolbar-bg); border: 1px solid var(--toolbar-border);
  border-radius: 4px; padding: 28px 32px; min-width: 340px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.8);
}
.modal h2 {
  font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ruler-stop); margin-bottom: 22px;
}
.modal label {
  display: block; font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ruler-text);
  margin-bottom: 4px; margin-top: 14px;
}
.modal input, .modal select {
  width: 100%; padding: 7px 10px;
  background: var(--bg); border: 1px solid var(--toolbar-border);
  border-radius: 3px; color: var(--btn-text);
  font-family: inherit; font-size: 12px; outline: none;
}
.modal input:focus, .modal select:focus { border-color: var(--ruler-stop); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
.modal-actions .tb-btn { padding: 7px 16px; font-size: 11px; }
.modal-actions .tb-btn.primary { background: var(--ruler-stop); color: var(--toolbar-bg); }
.modal-actions .tb-btn.primary:hover { background: #d4b06a; }

/* ── CORRECTION BRUSH ── */
body.correction-mode { cursor: none; }
#correction-brush { position: absolute; pointer-events: none; z-index: 60; display: none; }
body.correction-mode #correction-brush { display: block; }
</style>
</head>
<body>

<div id="toolbar">
  <span id="toolbar-title">type(rä)writer</span>
  <button class="tb-btn" id="btn-new">New</button>
  <button class="tb-btn" id="btn-import">Import</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-export">Export</button>
  <button class="tb-btn" id="btn-print">Print</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-add-page">Add Page</button>
  <button class="tb-btn" id="btn-del-page">Delete Page</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-correction">Correction</button>
  <div id="status-bar">A4 · Courier Prime · 12pt</div>
</div>

<div id="ruler-corner"></div>
<canvas id="ruler-top"></canvas>
<canvas id="ruler-left"></canvas>

<div id="viewport">
  <div id="pages-container"></div>
  <div id="cursor"></div>
  <div id="correction-brush"></div>
</div>

<!-- NEW FILE MODAL -->
<div class="modal-overlay hidden" id="modal-new">
  <div class="modal">
    <h2>New Document</h2>
    <label>Filename</label>
    <input type="text" id="new-filename" value="document" spellcheck="false">
    <label>Paper Size</label>
    <select id="new-size">
      <option value="B4">B4 (250 × 353 mm)</option>
      <option value="Letter">US Letter (216 × 279 mm)</option>
      <option value="Legal">US Legal (216 × 356 mm)</option>
      <option value="A4" selected>A4 (210 × 297 mm)</option>
      <option value="A5">A5 (148 × 210 mm)</option>
      <option value="HalfLetter">Half Letter (140 × 216 mm)</option>
      <option value="A6">A6 (105 × 148 mm)</option>
    </select>
    <label>Font</label>
    <select id="new-font">
      <option value="prestige">Courier Prime</option>
      <option value="gothic">Anonymous Pro</option>
      <option value="univers">Arimo</option>
      <option value="bembo">EB Garamond</option>
    </select>
    <label>Font Size</label>
    <select id="new-fontsize">
      <option value="small">Small (10pt)</option>
      <option value="large" selected>Large (12pt)</option>
    </select>
    <div class="modal-actions">
      <button class="tb-btn" id="new-cancel">Cancel</button>
      <button class="tb-btn primary" id="new-ok">Create</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay hidden" id="modal-export">
  <div class="modal">
    <h2>Export</h2>
    <label>Format</label>
    <select id="export-format">
      <option value="pdf">PDF</option>
      <option value="jpg">JPEG</option>
      <option value="gif">GIF (PNG data)</option>
    </select>
    <div class="modal-actions">
      <button class="tb-btn" id="export-cancel">Cancel</button>
      <button class="tb-btn primary" id="export-ok">Export</button>
    </div>
  </div>
</div>

<!-- UNSAVED CHANGES MODAL -->
<div class="modal-overlay hidden" id="modal-unsaved">
  <div class="modal">
    <h2>Unsaved Changes</h2>
    <p style="font-size:12px;color:var(--btn-text);line-height:1.5;">Export before continuing?</p>
    <div class="modal-actions">
      <button class="tb-btn" id="unsaved-cancel">Cancel</button>
      <button class="tb-btn" id="unsaved-discard">Don't Export</button>
      <button class="tb-btn primary" id="unsaved-export">Export First</button>
    </div>
  </div>
</div>

<!-- SCALE WARNING MODAL -->
<div class="modal-overlay hidden" id="modal-warning">
  <div class="modal">
    <h2>Page Size Adjusted</h2>
    <p style="font-size:12px;color:var(--btn-text);line-height:1.6;" id="warning-text"></p>
    <div class="modal-actions">
      <button class="tb-btn primary" id="warning-ok">Continue</button>
    </div>
  </div>
</div>

<script type="module">
import { MM_TO_PX, getSizePx, resolveImportedSize } from './src/paperSizes.mjs';
import { createCursorState, moveLeft, moveRight, scrollUp, scrollDown,
         setMarginLeft, setMarginRight, advanceCursor } from './src/cursorState.mjs';
import { createPage, addPageAfter, deletePage, nearestPageIndex, computePageLayouts } from './src/pageModel.mjs';
import { FONTS, FONT_SIZES, measureChar, stampGlyph, paintCorrection, flattenLayers } from './src/glyphPipeline.mjs';
import { createTabStops, toggleTabStop, tabAdvance } from './src/tabStops.mjs';

// ── LAYOUT CONSTANTS (match CSS :root vars) ────────────────────────────────
const RULER_W  = 32;
const RULER_H  = 24;
const TOOLBAR_H = 42;

// ── DOM REFS ───────────────────────────────────────────────────────────────
const viewport        = document.getElementById('viewport');
const pagesContainer  = document.getElementById('pages-container');
const cursorEl        = document.getElementById('cursor');
const corrBrush       = document.getElementById('correction-brush');
const statusBar       = document.getElementById('status-bar');
const rulerTopCanvas  = document.getElementById('ruler-top');
const rulerLeftCanvas = document.getElementById('ruler-left');

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  pages: [], layouts: [],
  cursor: null,
  fontKey: 'prestige', fontSizeKey: 'large',
  filename: 'document', sizeName: 'A4',
  charW: 0, charH: 0,
  isDirty: false,
  correctionMode: false,
  pendingAction: null,
  tabStops: [],
};

function vw() { return viewport.offsetWidth; }
function vh() { return viewport.offsetHeight; }

// ── FONT MEASUREMENT ───────────────────────────────────────────────────────
function measureCurrentFont() {
  const tmp = document.createElement('canvas');
  const { w, h } = measureChar(
    FONTS[state.fontKey].family,
    FONT_SIZES[state.fontSizeKey],
    tmp.getContext('2d'),
  );
  state.charW = w;
  state.charH = h;
}

// ── INIT ───────────────────────────────────────────────────────────────────
function initDocument(sizeName, fontKey, fontSizeKey, filename) {
  state.fontKey     = fontKey;
  state.fontSizeKey = fontSizeKey;
  state.filename    = filename;
  state.sizeName    = sizeName;
  measureCurrentFont();

  const { w, h } = getSizePx(sizeName);
  state.pages    = [createPage(w, h)];
  state.isDirty  = false;
  state.tabStops = createTabStops();
  state.cursor   = createCursorState({
    viewportWidth: vw(), viewportHeight: vh(),
    pageWidthPx: w, pageHeightPx: h,
    charWidthPx: state.charW, charHeightPx: state.charH,
  });

  renderAll();
  updateStatus();
  focusSink();
}

// ── PAGE DOM ───────────────────────────────────────────────────────────────
const pageEls = []; // [{wrapper, bgEl, editEl, badge}]

function syncPageEls() {
  while (pageEls.length < state.pages.length) {
    const page    = state.pages[pageEls.length];
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';

    const mkCanvas = () => {
      const c = document.createElement('canvas');
      c.className = 'page-canvas';
      c.width  = page.widthPx;  c.height  = page.heightPx;
      c.style.width  = page.widthPx  + 'px';
      c.style.height = page.heightPx + 'px';
      return c;
    };
    const bgEl   = mkCanvas();
    const editEl = mkCanvas();
    const badge  = document.createElement('div');
    badge.className = 'page-badge';

    wrapper.style.width  = page.widthPx  + 'px';
    wrapper.style.height = page.heightPx + 'px';
    wrapper.append(bgEl, editEl, badge);
    pagesContainer.appendChild(wrapper);
    pageEls.push({ wrapper, bgEl, editEl, badge });
  }
  while (pageEls.length > state.pages.length) pageEls.pop().wrapper.remove();

  const multi = state.pages.length > 1;
  pageEls.forEach(({ badge }, i) => { badge.textContent = multi ? `— ${i + 1} —` : ''; });
}

function blitPage(i) {
  const { bgEl, editEl } = pageEls[i];
  const { bgCanvas, editCanvas } = state.pages[i];
  bgEl.getContext('2d').drawImage(bgCanvas, 0, 0);
  editEl.getContext('2d').drawImage(editCanvas, 0, 0);
}

function blitAllPages() { state.pages.forEach((_, i) => blitPage(i)); }

// ── LAYOUT & RENDER ────────────────────────────────────────────────────────
function computeLayouts() {
  state.layouts = computePageLayouts(state.pages, state.cursor.paperY, vw());
}

function positionPageEls() {
  syncPageEls();
  const widest    = Math.max(...state.pages.map(p => p.widthPx));
  const available = vw() - 32;
  const scale     = widest > available ? available / widest : 1;
  pagesContainer.style.transform = scale < 1 ? `scale(${scale})` : '';
  state.layouts.forEach(({ x, y }, i) => {
    pageEls[i].wrapper.style.left = x + 'px';
    pageEls[i].wrapper.style.top  = y + 'px';
  });
}

function positionCursor() {
  const s = state.cursor;
  cursorEl.style.cssText =
    `left:${s.cursorX}px;top:${s.cursorViewportY}px;` +
    `width:${s.charWidthPx}px;height:${s.charHeightPx}px`;
}

function renderAll() {
  computeLayouts();
  positionPageEls();
  blitAllPages();
  positionCursor();
  drawRulers();
}

// ── RULERS ────────────────────────────────────────────────────────────────
function drawRulers() {
  if (state.layouts.length === 0) return;
  const { x: pageLeft, y: pageTop } = state.layouts[0];
  const pageW = state.pages[0].widthPx;
  const pageH = state.pages[0].heightPx;
  const cmPx  = MM_TO_PX * 10;

  // Top ruler
  const rtW = vw();
  rulerTopCanvas.width  = rtW;
  rulerTopCanvas.height = RULER_H;
  const rt = rulerTopCanvas.getContext('2d');
  rt.fillStyle = '#232220';
  rt.fillRect(0, 0, rtW, RULER_H);

  rt.textAlign = 'center';
  rt.font      = '8px "Courier Prime", monospace';
  for (let x = pageLeft; x < pageLeft + pageW; x += cmPx / 2) {
    const isCm = Math.abs((x - pageLeft) % cmPx) < 0.5;
    const tickH = isCm ? 10 : 6;
    rt.strokeStyle = isCm ? '#5a5855' : '#3d3b37';
    rt.beginPath(); rt.moveTo(x, RULER_H - tickH); rt.lineTo(x, RULER_H); rt.stroke();
    if (isCm) {
      const label = Math.round((x - pageLeft) / cmPx);
      if (label > 0) { rt.fillStyle = '#6b6760'; rt.fillText(label, x, RULER_H - 11); }
    }
  }

  // Margin stops
  const s = state.cursor;
  rt.fillStyle = '#c8a45a';
  rt.fillRect(pageLeft + s.marginLeft  - 1, 0, 2, RULER_H);
  rt.fillRect(pageLeft + s.marginRight - 1, 0, 2, RULER_H);

  // Tab stop triangles (amber, pointing down)
  for (const stop of state.tabStops) {
    const tx = pageLeft + stop;
    rt.beginPath();
    rt.moveTo(tx - 4, 0); rt.lineTo(tx + 4, 0); rt.lineTo(tx, 7);
    rt.closePath(); rt.fill();
  }

  // Left ruler
  const rlH = vh(); // matches CSS: top=toolbar+ruler, bottom=0
  rulerLeftCanvas.width  = RULER_W;
  rulerLeftCanvas.height = rlH;
  const rl = rulerLeftCanvas.getContext('2d');
  rl.fillStyle = '#232220';
  rl.fillRect(0, 0, RULER_W, rlH);

  rl.textAlign = 'right';
  rl.font      = '8px "Courier Prime", monospace';
  for (let y = pageTop; y < pageTop + pageH; y += cmPx / 2) {
    const isCm = Math.abs((y - pageTop) % cmPx) < 0.5;
    const tickW = isCm ? 10 : 6;
    rl.strokeStyle = isCm ? '#5a5855' : '#3d3b37';
    rl.beginPath(); rl.moveTo(RULER_W - tickW, y); rl.lineTo(RULER_W, y); rl.stroke();
    if (isCm) {
      const label = Math.round((y - pageTop) / cmPx);
      if (label > 0) {
        rl.save();
        rl.fillStyle = '#6b6760';
        rl.translate(RULER_W - 12, y);
        rl.rotate(-Math.PI / 2);
        rl.fillText(label, 0, 0);
        rl.restore();
      }
    }
  }
}

// ── STATUS ────────────────────────────────────────────────────────────────
function updateStatus() {
  const { label } = FONTS[state.fontKey];
  const pt        = FONT_SIZES[state.fontSizeKey];
  statusBar.textContent = `${state.sizeName} · ${label} · ${pt}pt · ${state.pages.length}p`;
}

// ── KEYBOARD SINK ─────────────────────────────────────────────────────────
const sink = document.createElement('textarea');
Object.assign(sink.style, { position: 'fixed', opacity: '0', width: '1px', height: '1px', top: '-9999px', left: '-9999px' });
sink.setAttribute('autocomplete', 'off');
sink.setAttribute('autocorrect', 'off');
sink.setAttribute('autocapitalize', 'off');
sink.setAttribute('spellcheck', 'false');
document.body.appendChild(sink);
function focusSink() { sink.focus(); }

// ── KEYDOWN ───────────────────────────────────────────────────────────────
let typingTimer = null;

sink.addEventListener('keydown', e => {
  if (state.correctionMode) return;
  const s = state.cursor;

  if (e.key === 'ArrowLeft')  { e.preventDefault(); state.cursor = moveLeft(s);   renderAll(); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); state.cursor = moveRight(s);  renderAll(); return; }
  if (e.key === 'ArrowUp')    { e.preventDefault(); state.cursor = scrollUp(s);   renderAll(); return; }
  if (e.key === 'ArrowDown')  { e.preventDefault(); state.cursor = scrollDown(s); renderAll(); return; }

  if (e.ctrlKey && e.key === 't') { e.preventDefault(); doAddPage();    return; }
  if (e.ctrlKey && e.key === 'w') { e.preventDefault(); doDeletePage(); return; }

  if (e.key === 'Backspace') { e.preventDefault(); state.cursor = moveLeft(s);  renderAll(); return; }
  if (e.key === 'Enter')     { e.preventDefault(); state.cursor = scrollUp(s);  renderAll(); return; }

  if (e.key === 'Tab') {
    e.preventDefault();
    const pageLocalX      = s.cursorX - s.pageX;
    const rightMarginLocal = s.marginRight - s.charWidthPx;
    const targetLocal      = tabAdvance(state.tabStops, pageLocalX, rightMarginLocal);
    state.cursor = { ...s, cursorX: s.pageX + targetLocal };
    renderAll();
  }
});

// ── KEYPRESS + COMPOSITION ────────────────────────────────────────────────
let composing = false;
const DEAD_KEY_RE = /^[\u0060\u00b4\u005e\u007e\u00a8\u02c6\u02dc\u02d9\u02dd\u02db\u02da\u02c7\u00b8\u02cd\u0384\u0385]$/;

sink.addEventListener('keypress', e => {
  if (state.correctionMode || composing || e.ctrlKey || e.metaKey) return;
  const char = e.key;
  if (!char || char.length !== 1) return;
  e.preventDefault();
  typeChar(char);
});

sink.addEventListener('compositionstart',  () => { composing = true; });
sink.addEventListener('compositionupdate', () => {});
sink.addEventListener('compositionend', e => {
  composing = false;
  sink.value = '';
  const data = e.data;
  if (!data) return;
  const isDead = data.length === 1 && DEAD_KEY_RE.test(data);
  for (let i = 0; i < data.length; i++) {
    typeChar(data[i], isDead && i === 0 && data.length === 1);
  }
});

// ── TYPE CHAR ─────────────────────────────────────────────────────────────
function typeChar(char, isDead = false) {
  const s = state.cursor;
  computeLayouts();

  const pageIdx = nearestPageIndex(state.layouts, s.cursorViewportY);
  const layout  = state.layouts[pageIdx];
  const page    = state.pages[pageIdx];
  const localX  = s.cursorX - layout.x;
  const localY  = s.cursorViewportY - layout.y;

  const fullyOn   = localX >= 0 && localY >= 0
                 && localX + s.charWidthPx  <= page.widthPx
                 && localY + s.charHeightPx <= page.heightPx;
  const partialOn = localX + s.charWidthPx > 0 && localY + s.charHeightPx > 0
                 && localX < page.widthPx && localY < page.heightPx;

  if (fullyOn || partialOn) {
    const clip = partialOn && !fullyOn
      ? { x: 0, y: 0, w: page.widthPx, h: page.heightPx } : null;
    stampGlyph(
      char, FONTS[state.fontKey].family, FONT_SIZES[state.fontSizeKey],
      page.editCanvas.getContext('2d'), localX, localY,
      s.charWidthPx, s.charHeightPx, clip,
    );
    blitPage(pageIdx);
    state.isDirty = true;
  }

  if (!isDead) state.cursor = advanceCursor(s);
  positionCursor();
  drawRulers();

  cursorEl.classList.add('typing');
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => cursorEl.classList.remove('typing'), 600);
}

// ── CORRECTION TOOL ───────────────────────────────────────────────────────
const btnCorr = document.getElementById('btn-correction');
btnCorr.addEventListener('click', () => {
  state.correctionMode = !state.correctionMode;
  btnCorr.classList.toggle('active', state.correctionMode);
  document.body.classList.toggle('correction-mode', state.correctionMode);
  if (!state.correctionMode) { corrBrush.style.display = 'none'; focusSink(); }
});

let corrShift = false, corrCtrl = false;
document.addEventListener('keydown', e => {
  if (!state.correctionMode) return;
  if (e.key === 'Shift')   corrShift = true;
  if (e.key === 'Control') corrCtrl  = true;
  if (e.key === 'Escape') {
    state.correctionMode = false;
    btnCorr.classList.remove('active');
    document.body.classList.remove('correction-mode');
    corrBrush.style.display = 'none';
    focusSink();
  }
});
document.addEventListener('keyup', e => {
  if (e.key === 'Shift')   corrShift = false;
  if (e.key === 'Control') corrCtrl  = false;
});

function corrMode() {
  return corrCtrl ? 'ink' : corrShift ? 'highlight' : 'erase';
}
function corrBrushColor() {
  return { erase: 'rgba(254,252,245,0.67)', highlight: 'rgba(255,224,102,0.5)', ink: '#222' }[corrMode()];
}

viewport.addEventListener('mousemove', e => {
  if (!state.correctionMode) return;
  const rx = e.clientX - RULER_W;
  const ry = e.clientY - TOOLBAR_H - RULER_H;
  const s  = state.cursor;
  corrBrush.style.cssText =
    `left:${rx - s.charWidthPx / 2}px;top:${ry - s.charHeightPx / 2}px;` +
    `width:${s.charWidthPx}px;height:${s.charHeightPx}px;` +
    `background:${corrBrushColor()};display:block`;
});
viewport.addEventListener('mouseleave', () => { corrBrush.style.display = 'none'; });

let corrPainting = false;
viewport.addEventListener('mousedown', e => { if (state.correctionMode) { corrPainting = true; applyCorrection(e); } });
viewport.addEventListener('mousemove', e => { if (state.correctionMode && corrPainting) applyCorrection(e); });
document.addEventListener('mouseup',   () => { corrPainting = false; });

function applyCorrection(e) {
  computeLayouts();
  const rx = e.clientX - RULER_W;
  const ry = e.clientY - TOOLBAR_H - RULER_H;
  for (let i = 0; i < state.layouts.length; i++) {
    const { x, y, w, h } = state.layouts[i];
    if (rx >= x && rx <= x + w && ry >= y && ry <= y + h) {
      const s = state.cursor;
      paintCorrection(
        state.pages[i].editCanvas.getContext('2d'),
        rx - x - s.charWidthPx / 2, ry - y - s.charHeightPx / 2,
        s.charWidthPx, s.charHeightPx, corrMode(),
      );
      blitPage(i);
      state.isDirty = true;
      break;
    }
  }
}

// ── RULER CLICKS (margins + tab stops) ───────────────────────────────────
const MARGIN_ZONE = 0.15;

rulerTopCanvas.addEventListener('click', e => {
  if (state.layouts.length === 0) return;
  const pageLeft  = state.layouts[0].x;
  const pageWidth = state.pages[0].widthPx;
  const pageLocal = e.offsetX - pageLeft;
  if (pageLocal < 0 || pageLocal > pageWidth) return;

  if (pageLocal <= pageWidth * MARGIN_ZONE) {
    state.cursor = setMarginLeft(state.cursor, pageLocal);
  } else if (pageLocal >= pageWidth * (1 - MARGIN_ZONE)) {
    state.cursor = setMarginRight(state.cursor, pageLocal);
  } else {
    state.tabStops = toggleTabStop(state.tabStops, pageLocal);
  }
  drawRulers();
  positionCursor();
});

// ── ADD / DELETE PAGE ─────────────────────────────────────────────────────
function nearestIdx() {
  computeLayouts();
  return nearestPageIndex(state.layouts, state.cursor.cursorViewportY);
}
function doAddPage()    { state.pages = addPageAfter(state.pages, nearestIdx()); renderAll(); updateStatus(); }
function doDeletePage() { state.pages = deletePage(state.pages, nearestIdx());   renderAll(); updateStatus(); }

document.getElementById('btn-add-page').addEventListener('click', doAddPage);
document.getElementById('btn-del-page').addEventListener('click', doDeletePage);

// ── UNSAVED GUARD ─────────────────────────────────────────────────────────
function guardUnsaved(action) {
  if (!state.isDirty) { action(); return; }
  state.pendingAction = action;
  document.getElementById('modal-unsaved').classList.remove('hidden');
}

document.getElementById('unsaved-cancel').addEventListener('click', () => {
  document.getElementById('modal-unsaved').classList.add('hidden');
  state.pendingAction = null;
  focusSink();
});
document.getElementById('unsaved-discard').addEventListener('click', () => {
  document.getElementById('modal-unsaved').classList.add('hidden');
  const fn = state.pendingAction; state.pendingAction = null; fn?.();
});
document.getElementById('unsaved-export').addEventListener('click', () => {
  document.getElementById('modal-unsaved').classList.add('hidden');
  doExportJpg().then(() => { state.pendingAction?.(); state.pendingAction = null; });
});

// ── NEW FILE ──────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', () =>
  guardUnsaved(() => document.getElementById('modal-new').classList.remove('hidden')));
document.getElementById('new-cancel').addEventListener('click', () => {
  document.getElementById('modal-new').classList.add('hidden'); focusSink();
});
document.getElementById('new-ok').addEventListener('click', () => {
  const filename = document.getElementById('new-filename').value || 'document';
  const sizeName = document.getElementById('new-size').value;
  const fontKey  = document.getElementById('new-font').value;
  const fsKey    = document.getElementById('new-fontsize').value;
  document.getElementById('modal-new').classList.add('hidden');
  initDocument(sizeName, fontKey, fsKey, filename);
});

// ── EXPORT ────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () =>
  document.getElementById('modal-export').classList.remove('hidden'));
document.getElementById('export-cancel').addEventListener('click', () => {
  document.getElementById('modal-export').classList.add('hidden'); focusSink();
});
document.getElementById('export-ok').addEventListener('click', async () => {
  const fmt = document.getElementById('export-format').value;
  document.getElementById('modal-export').classList.add('hidden');
  if (fmt === 'pdf') await doExportPdf();
  else if (fmt === 'jpg') await doExportJpg();
  else await doExportGif();
  focusSink();
});

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: filename }).click();
  URL.revokeObjectURL(url);
}

function pageFilename(base, i, total, ext) {
  return total > 1 ? `${base}-${i + 1}.${ext}` : `${base}.${ext}`;
}

async function doExportJpg() {
  for (let i = 0; i < state.pages.length; i++) {
    const { bgCanvas, editCanvas, widthPx, heightPx } = state.pages[i];
    const flat = flattenLayers(bgCanvas, editCanvas, widthPx, heightPx);
    downloadBlob(await flat.convertToBlob({ type: 'image/jpeg', quality: 0.92 }),
                 pageFilename(state.filename, i, state.pages.length, 'jpg'));
  }
  state.isDirty = false;
}

async function doExportGif() {
  // True GIF encoding requires gif.js (npm); export as PNG with .gif extension.
  for (let i = 0; i < state.pages.length; i++) {
    const { bgCanvas, editCanvas, widthPx, heightPx } = state.pages[i];
    const flat = flattenLayers(bgCanvas, editCanvas, widthPx, heightPx);
    downloadBlob(await flat.convertToBlob({ type: 'image/png' }),
                 pageFilename(state.filename, i, state.pages.length, 'gif'));
  }
  state.isDirty = false;
}

// Flatten page to original resolution (undoes edit-canvas scaling / rotation)
function flattenForExport(page) {
  const scaled  = page.scale !== 1 && page.originalWidthMm != null;
  const origWpx = scaled ? Math.round(page.originalWidthMm  * MM_TO_PX) : page.widthPx;
  const origHpx = scaled ? Math.round(page.originalHeightMm * MM_TO_PX) : page.heightPx;

  const out = new OffscreenCanvas(origWpx, origHpx);
  const ctx = out.getContext('2d');
  ctx.drawImage(page.bgCanvas,   0, 0, origWpx, origHpx);
  ctx.drawImage(page.editCanvas, 0, 0, origWpx, origHpx);

  if (page.rotated) {
    // Rotate 90° CW back to landscape
    const rot  = new OffscreenCanvas(origHpx, origWpx);
    const rCtx = rot.getContext('2d');
    rCtx.translate(origHpx / 2, origWpx / 2);
    rCtx.rotate(Math.PI / 2);
    rCtx.drawImage(out, -origWpx / 2, -origHpx / 2);
    return { canvas: rot, wMm: origHpx / MM_TO_PX, hMm: origWpx / MM_TO_PX };
  }
  return { canvas: out, wMm: origWpx / MM_TO_PX, hMm: origHpx / MM_TO_PX };
}

function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result); r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function doExportPdf() {
  const { jsPDF } = window.jspdf;
  const pages = state.pages.map(flattenForExport);
  const { wMm: w0, hMm: h0, canvas: c0 } = pages[0];
  const doc = new jsPDF({ orientation: w0 > h0 ? 'landscape' : 'portrait', unit: 'mm', format: [w0, h0] });

  for (let i = 0; i < pages.length; i++) {
    const { canvas, wMm, hMm } = pages[i];
    if (i > 0) doc.addPage([wMm, hMm], wMm > hMm ? 'landscape' : 'portrait');
    const dataUrl = await blobToDataUrl(await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.95 }));
    doc.addImage(dataUrl, 'JPEG', 0, 0, wMm, hMm);
  }
  doc.save(`${state.filename}.pdf`);
  state.isDirty = false;
}

// ── PRINT ─────────────────────────────────────────────────────────────────
document.getElementById('btn-print').addEventListener('click', async () => {
  const urls = await Promise.all(state.pages.map(async p => {
    const flat = flattenLayers(p.bgCanvas, p.editCanvas, p.widthPx, p.heightPx);
    return URL.createObjectURL(await flat.convertToBlob({ type: 'image/png' }));
  }));
  const win = window.open('', '_blank', 'width=800,height=600');
  win.document.write(`<html><head><style>
    body{margin:0;background:#fff}
    img{display:block;page-break-after:always;max-width:100%}
  </style></head><body>${urls.map(u => `<img src="${u}">`).join('')}</body></html>`);
  win.document.close();
  win.onload = () => { win.print(); urls.forEach(URL.revokeObjectURL); };
  focusSink();
});

// ── IMPORT ────────────────────────────────────────────────────────────────
document.getElementById('btn-import').addEventListener('click', () =>
  guardUnsaved(() => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*,.pdf';
    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.type === 'application/pdf') await importPdf(file);
      else await importImage(file);
    };
    input.click();
  }));

async function importImage(file) {
  const blob   = new Blob([await file.arrayBuffer()], { type: file.type });
  const bitmap = await createImageBitmap(blob);
  const wMm    = bitmap.width  / MM_TO_PX;
  const hMm    = bitmap.height / MM_TO_PX;
  const res    = resolveImportedSize(wMm, hMm);
  if (res.needsWarning) showWarning(res, wMm, hMm);

  let finalBitmap = bitmap;
  if (res.rotated) {
    const tmp = new OffscreenCanvas(bitmap.height, bitmap.width);
    const ctx = tmp.getContext('2d');
    ctx.translate(bitmap.height / 2, bitmap.width / 2);
    ctx.rotate(Math.PI / 2);
    ctx.drawImage(bitmap, -bitmap.width / 2, -bitmap.height / 2);
    finalBitmap = await createImageBitmap(tmp);
  }

  const { w, h } = getSizePx(res.sizeName);
  const page = Object.assign(createPage(w, h, finalBitmap), {
    originalWidthMm:  res.rotated ? hMm : wMm,
    originalHeightMm: res.rotated ? wMm : hMm,
    rotated: res.rotated, scale: res.scale,
  });

  state.sizeName = res.sizeName;
  state.pages    = [page];
  state.isDirty  = false;
  state.tabStops = createTabStops();
  measureCurrentFont();
  state.cursor = createCursorState({
    viewportWidth: vw(), viewportHeight: vh(),
    pageWidthPx: w, pageHeightPx: h,
    charWidthPx: state.charW, charHeightPx: state.charH,
  });
  renderAll(); updateStatus();
}

async function importPdf(file) {
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

  const pdfDoc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const pages  = [];

  for (let p = 1; p <= pdfDoc.numPages; p++) {
    const pdfPage = await pdfDoc.getPage(p);
    const vp      = pdfPage.getViewport({ scale: 96 / 72 });
    const wMm     = vp.width  / MM_TO_PX;
    const hMm     = vp.height / MM_TO_PX;
    const res     = resolveImportedSize(wMm, hMm);
    if (p === 1 && res.needsWarning) showWarning(res, wMm, hMm);

    const { w, h } = getSizePx(res.sizeName);
    const off  = new OffscreenCanvas(w, h);
    const ctx  = off.getContext('2d');
    ctx.fillStyle = '#fefcf5'; ctx.fillRect(0, 0, w, h);
    await pdfPage.render({ canvasContext: ctx,
      viewport: pdfPage.getViewport({ scale: (96 / 72) * res.scale }) }).promise;

    pages.push(Object.assign(createPage(w, h, await createImageBitmap(off)), {
      originalWidthMm: wMm, originalHeightMm: hMm,
      rotated: res.rotated, scale: res.scale,
    }));
  }

  state.pages    = pages;
  state.sizeName = resolveImportedSize(pages[0].originalWidthMm, pages[0].originalHeightMm).sizeName;
  state.isDirty  = false;
  state.tabStops = createTabStops();
  measureCurrentFont();
  state.cursor = createCursorState({
    viewportWidth: vw(), viewportHeight: vh(),
    pageWidthPx: pages[0].widthPx, pageHeightPx: pages[0].heightPx,
    charWidthPx: state.charW, charHeightPx: state.charH,
  });
  renderAll(); updateStatus();
}

function showWarning(res, wMm, hMm) {
  const action = res.scale < 1 ? 'scaled down' : 'scaled up';
  document.getElementById('warning-text').textContent =
    `The imported page (${Math.round(wMm)}×${Math.round(hMm)} mm) is outside the supported range. ` +
    `It has been ${action} to fit ${res.sizeName} for editing` +
    `${res.rotated ? ' and rotated to portrait' : ''}.`;
  document.getElementById('modal-warning').classList.remove('hidden');
}
document.getElementById('warning-ok').addEventListener('click', () => {
  document.getElementById('modal-warning').classList.add('hidden'); focusSink();
});

// ── RESIZE ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!state.cursor) return;
  const { paperY, cursorX, pageX, marginLeft, marginRight, charWidthPx } = state.cursor;
  const paperOffset  = paperY - vh() * (2 / 3);
  const localCursorX = cursorX - pageX;
  const page0 = state.pages[0];
  const next  = createCursorState({
    viewportWidth: vw(), viewportHeight: vh(),
    pageWidthPx: page0.widthPx, pageHeightPx: page0.heightPx,
    charWidthPx: state.charW, charHeightPx: state.charH,
  });
  // Clamp preserved cursorX inside (possibly changed) viewport
  const restoredCursorX = next.pageX + Math.max(marginLeft, Math.min(localCursorX, marginRight - charWidthPx));
  state.cursor = { ...next, paperY: next.paperY + paperOffset, cursorX: restoredCursorX, marginLeft, marginRight };
  renderAll();
});

// ── BOOT ──────────────────────────────────────────────────────────────────
initDocument('A4', 'prestige', 'large', 'document');

viewport.addEventListener('click', focusSink);
document.addEventListener('click', e => {
  if (!state.correctionMode && !e.target.closest('.modal') && !e.target.closest('#toolbar')) focusSink();
});
</script>
</body>
</html>
